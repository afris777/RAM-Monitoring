name: RAM Price Scraper

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
    - cron: "0 19 * * *"  # 19:00 UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to push prices.db back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      EMAIL_ADDRESS:      ${{ secrets.EMAIL_ADDRESS }}
      EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated prices.db
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add prices.db
          # Only commit if the file actually changed
          git diff --staged --quiet || (
            git commit -m "chore: update prices.db [$(date -u '+%Y-%m-%d %H:%M UTC')]" &&
            git push
          )
